# Render Blueprint: https://render.com/docs/blueprint-spec
# APIs only — deploy the Vite app (`web/`) on Vercel (see web/vercel.json).
# In Render: New → Blueprint → connect repo → apply, or create two Web Services
# with the same rootDir / build / start as below.

services:
  # Mobile app API (Express) — folder: backend
  - type: web
    name: customerconnect-mobile-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health

  # Web dashboard API — folder: web_backend
  - type: web
    name: customerconnect-web-api
    runtime: node
    rootDir: web_backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
